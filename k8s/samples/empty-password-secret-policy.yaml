---
apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: empty-password-secret-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
  interval: "15s"

  roles:
    - name: empty-pw-user
      login: true
      comment: "E2E test: password Secret key has empty value"
      password:
        secretRef:
          name: empty-password-secret
        secretKey: empty-pw-user
