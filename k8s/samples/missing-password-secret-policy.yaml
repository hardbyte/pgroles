---
apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: missing-password-secret-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
  interval: "15s"

  roles:
    - name: missing-pw-user
      login: true
      comment: "E2E test: password references non-existent Secret"
      password:
        secretRef:
          name: nonexistent-password-secret
        secretKey: missing-pw-user
