---
apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: generated-password-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
  interval: "15s"

  roles:
    - name: genuser
      login: true
      comment: "E2E test: role with operator-generated password"
      password:
        generate:
          length: 32
      password_valid_until: "2099-12-31T00:00:00Z"
