---
apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: basic-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
    # secretKey defaults to DATABASE_URL
  interval: "5m"
  default_owner: postgres

  profiles:
    editor:
      grants:
        - object: { type: schema }
          privileges: [USAGE]
        - object: { type: table, name: "*" }
          privileges: [SELECT, INSERT, UPDATE, DELETE]
        - object: { type: sequence, name: "*" }
          privileges: [USAGE]
      default_privileges:
        - on_type: table
          privileges: [SELECT, INSERT, UPDATE, DELETE]
        - on_type: sequence
          privileges: [USAGE]
    viewer:
      grants:
        - object: { type: schema }
          privileges: [USAGE]
        - object: { type: table, name: "*" }
          privileges: [SELECT]
      default_privileges:
        - on_type: table
          privileges: [SELECT]

  schemas:
    - name: public
      profiles: [editor, viewer]
