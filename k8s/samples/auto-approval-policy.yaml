apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: auto-approval-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
  interval: "30s"
  mode: apply
  approval: auto
  roles:
    - name: auto_approved_user
      login: true
  grants:
    - role: auto_approved_user
      privileges: [CONNECT]
      object:
        type: database
        name: postgres
