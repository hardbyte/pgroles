---
apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: password-policy
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
  interval: "15s"

  roles:
    - name: password-user
      login: true
      comment: "E2E test: role with password from Secret"
      password:
        secretRef:
          name: role-passwords
        secretKey: password-user
      password_valid_until: "2099-12-31T00:00:00Z"
