apiVersion: pgroles.io/v1alpha1
kind: PostgresPolicy
metadata:
  name: multi-schema-a
  namespace: default
spec:
  connection:
    secretRef:
      name: postgres-credentials
  interval: "30s"
  mode: plan
  approval: manual
  profiles:
    viewer:
      grants:
        - object: { type: schema }
          privileges: [USAGE]
        - object: { type: table, name: "*" }
          privileges: [SELECT]
  schemas:
    - name: schema_alpha
      profiles: [viewer]
  roles:
    - name: app_alpha
      login: true
  memberships:
    - role: schema_alpha-viewer
      members:
        - { name: app_alpha }
