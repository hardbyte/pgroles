---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgpolicy-operator
  namespace: pgpolicy-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pgpolicy-operator
rules:
  # Watch and manage PostgresPolicy CRDs
  - apiGroups: ["pgpolicy.io"]
    resources: ["postgrespolicies"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["pgpolicy.io"]
    resources: ["postgrespolicies/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["pgpolicy.io"]
    resources: ["postgrespolicies/finalizers"]
    verbs: ["update"]
  # Read Secrets for database connection strings
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # Emit events for observability
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pgpolicy-operator
subjects:
  - kind: ServiceAccount
    name: pgpolicy-operator
    namespace: pgpolicy-system
roleRef:
  kind: ClusterRole
  name: pgpolicy-operator
  apiGroup: rbac.authorization.k8s.io
