---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgroles-operator
  namespace: pgroles-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pgroles-operator
rules:
  # Watch and manage PostgresPolicy CRDs
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicies"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicies/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicies/finalizers"]
    verbs: ["update"]
  # Read Secrets for database connection strings and password references;
  # create/update Secrets for operator-generated passwords.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Emit events for kubectl describe / operational debugging
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pgroles-operator
subjects:
  - kind: ServiceAccount
    name: pgroles-operator
    namespace: pgroles-system
roleRef:
  kind: ClusterRole
  name: pgroles-operator
  apiGroup: rbac.authorization.k8s.io
