---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgroles-operator
  namespace: pgroles-system
  labels:
    app.kubernetes.io/name: pgroles-operator
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgroles-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgroles-operator
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: pgroles-operator
      containers:
        - name: operator
          image: ghcr.io/hardbyte/pgroles-operator:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RUST_LOG
              value: "info,pgroles_operator=debug"
            - name: OPERATOR_HTTP_ADDR
              value: "0.0.0.0:8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
