# Example: Password-protected login roles
#
# Passwords are NEVER stored in manifest files. Instead, they reference
# environment variables that must be set at apply time. This follows the
# same security model as DATABASE_URL.
#
# Usage:
#   export APP_SERVICE_PASSWORD="strong-random-password"
#   export REPORTING_PASSWORD="another-strong-password"
#   pgroles apply -f examples/password-roles.yaml --database-url postgres://...

default_owner: app_migrator

profiles:
  editor:
    grants:
      - privileges: [USAGE]
        object: { type: schema }
      - privileges: [SELECT, INSERT, UPDATE, DELETE]
        object: { type: table, name: "*" }
    default_privileges:
      - privileges: [SELECT, INSERT, UPDATE, DELETE]
        on_type: table

  viewer:
    grants:
      - privileges: [USAGE]
        object: { type: schema }
      - privileges: [SELECT]
        object: { type: table, name: "*" }

schemas:
  - name: inventory
    profiles: [editor, viewer]

roles:
  # Login role with password from environment variable.
  # The password is set on every apply (idempotent).
  - name: app-service
    login: true
    password:
      from_env: APP_SERVICE_PASSWORD

  # Login role with password and expiration.
  # After the expiration date, PostgreSQL will reject password authentication.
  - name: reporting-service
    login: true
    password:
      from_env: REPORTING_PASSWORD
    password_valid_until: "2025-12-31T00:00:00Z"

  # Login role without a password — useful for certificate or IAM auth.
  - name: readonly-service
    login: true

memberships:
  - role: inventory-editor
    members:
      - name: app-service
  - role: inventory-viewer
    members:
      - name: reporting-service
      - name: readonly-service
