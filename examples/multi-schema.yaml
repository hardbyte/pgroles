# Multi-schema pgroles manifest with profiles, one-off roles, and
# external identity provider memberships.
#
# Scenario: a SaaS product with separate schemas for different domains
# (orders, products, customers). A migration runner role owns all objects.
# Teams access schemas through Google Workspace groups managed externally
# (e.g. via Terraform) — pgroles only manages the membership edges, not
# the group roles themselves.

default_owner: migration_runner

profiles:
  editor:
    grants:
      - object: { type: schema }
        privileges: [USAGE]
      - object: { type: table, name: "*" }
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - object: { type: sequence, name: "*" }
        privileges: [USAGE, SELECT]
      - object: { type: function, name: "*" }
        privileges: [EXECUTE]
    default_privileges:
      - on_type: table
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on_type: sequence
        privileges: [USAGE, SELECT]
      - on_type: function
        privileges: [EXECUTE]

  viewer:
    grants:
      - object: { type: schema }
        privileges: [USAGE]
      - object: { type: table, name: "*" }
        privileges: [SELECT]
      - object: { type: sequence, name: "*" }
        privileges: [SELECT]
    default_privileges:
      - on_type: table
        privileges: [SELECT]
      - on_type: sequence
        privileges: [SELECT]

schemas:
  - name: orders
    profiles: [editor, viewer]
  - name: products
    profiles: [editor, viewer]
  - name: customers
    profiles: [editor, viewer]

# One-off roles that don't fit the profile pattern.
roles:
  - name: readonly-all
    comment: "Cross-schema read-only access for analytics"
  - name: etl-service
    login: true
    comment: "Service account for the ETL pipeline"

# Grants for one-off roles — manually specified per-schema.
grants:
  - role: readonly-all
    object: { type: schema, name: orders }
    privileges: [USAGE]
  - role: readonly-all
    object: { type: table, schema: orders, name: "*" }
    privileges: [SELECT]
  - role: readonly-all
    object: { type: schema, name: products }
    privileges: [USAGE]
  - role: readonly-all
    object: { type: table, schema: products, name: "*" }
    privileges: [SELECT]
  - role: readonly-all
    object: { type: schema, name: customers }
    privileges: [USAGE]
  - role: readonly-all
    object: { type: table, schema: customers, name: "*" }
    privileges: [SELECT]

# Memberships — external group roles are NOT created by pgroles.
# Only the GRANT <role> TO <member> edge is managed.
memberships:
  - role: orders-editor
    members:
      - name: orders-team@example.com
  - role: orders-viewer
    members:
      - name: orders-readers@example.com
      - name: readonly-all
  - role: products-editor
    members:
      - name: products-team@example.com
  - role: products-viewer
    members:
      - name: products-readers@example.com
      - name: readonly-all
  - role: customers-editor
    members:
      - name: customers-team@example.com
  - role: customers-viewer
    members:
      - name: customers-readers@example.com
      - name: readonly-all
  - role: readonly-all
    members:
      - name: etl-service
