# Example showing a custom role_pattern and per-schema owner override.
#
# Some teams prefer naming like "schema_profile" (underscores) instead
# of the default "schema-profile" (hyphens). The role_pattern setting
# controls this at the schema level.

default_owner: deploy_user

profiles:
  writer:
    grants:
      - object: { type: schema }
        privileges: [USAGE, CREATE]
      - object: { type: table, name: "*" }
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - object: { type: sequence, name: "*" }
        privileges: [USAGE, SELECT]
    default_privileges:
      - on_type: table
        privileges: [SELECT, INSERT, UPDATE, DELETE]
      - on_type: sequence
        privileges: [USAGE, SELECT]

  reader:
    grants:
      - object: { type: schema }
        privileges: [USAGE]
      - object: { type: table, name: "*" }
        privileges: [SELECT]
    default_privileges:
      - on_type: table
        privileges: [SELECT]

schemas:
  # This schema uses underscore naming and a different owner.
  - name: analytics
    profiles: [writer, reader]
    role_pattern: "{schema}_{profile}"
    owner: analytics_admin

  # This schema uses the default pattern and default owner.
  - name: reporting
    profiles: [reader]
