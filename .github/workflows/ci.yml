name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint — clippy, rustfmt, CRD drift check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny@0.19.0 --locked

      - name: Check dependencies
        run: cargo deny check

      - name: CRD drift check
        run: scripts/check-crd-drift.sh

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests — with a live PostgreSQL
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests (PG${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pgroles_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: "postgres://postgres:testpassword@localhost:5432/pgroles_test"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests (including ignored)
        run: cargo test --workspace -- --include-ignored

  # ---------------------------------------------------------------------------
  # Job 4: Docker smoke tests — verify doc examples work
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pgroles_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: "postgres://postgres:testpassword@localhost:5432/pgroles_test"
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Build CLI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: cli
          load: true
          tags: pgroles:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Smoke: --help via entrypoint"
        run: docker run --rm pgroles:smoke --help

      - name: "Smoke: volume mount + validate"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests/fixtures:/work" \
            pgroles:smoke \
            validate -f smoke-test.yaml

      - name: "Smoke: volume mount + diff against live DB"
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -v "${{ github.workspace }}/tests/fixtures:/work" \
            pgroles:smoke \
            diff -f smoke-test.yaml --no-exit-code

      - name: "Smoke: derived image builds and runs"
        run: |
          printf 'FROM pgroles:smoke\nCOPY tests/fixtures/smoke-test.yaml .\n' > /tmp/Dockerfile.derived
          docker build -f /tmp/Dockerfile.derived -t pgroles:derived .
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            pgroles:derived \
            diff -f smoke-test.yaml --no-exit-code

  # ---------------------------------------------------------------------------
  # Job 5a: E2E — Operator Scenarios
  # ---------------------------------------------------------------------------
  e2e-operator:
    name: "E2E: Operator Scenarios"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          cluster-name: pgroles-e2e-operator

      - name: Run operator scenarios
        run: |
          source scripts/e2e-helpers.sh

          kubectl delete pgr basic-policy --wait=true

          kubectl apply -f k8s/samples/disjoint-policy.yaml
          wait_for_ready_true disjoint-policy
          assert_role_exists analytics

          pg_query 'DROP SCHEMA IF EXISTS operator_owned_schema CASCADE; DROP ROLE IF EXISTS operator_schema_owner;'
          kubectl apply -f k8s/samples/schema-owner-policy.yaml
          wait_for_ready_true schema-owner-policy
          assert_role_exists operator_schema_owner
          assert_schema_exists operator_owned_schema
          assert_schema_owner operator_owned_schema operator_schema_owner

          kubectl apply -f k8s/samples/second-disjoint-policy.yaml
          wait_for_ready_true second-disjoint-policy
          assert_role_exists reporting

          upsert_secret postgres-credentials \
            DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:15432/postgres'
          wait_for_ready_reason disjoint-policy DatabaseConnectionFailed
          wait_for_ready_reason second-disjoint-policy DatabaseConnectionFailed

          upsert_secret postgres-credentials \
            DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:5432/postgres'
          wait_for_ready_true disjoint-policy
          wait_for_ready_true second-disjoint-policy

          kubectl apply -f k8s/samples/conflicting-policy.yaml
          wait_for_ready_reason conflicting-policy ConflictingPolicy
          wait_for_event_reason conflicting-policy ConflictDetected

          kubectl apply -f k8s/samples/invalid-policy.yaml
          wait_for_ready_reason invalid-policy InvalidSpec

          kubectl apply -f k8s/samples/missing-secret-policy.yaml
          wait_for_ready_reason missing-secret-policy SecretFetchFailed
          wait_for_event_reason missing-secret-policy SecretFetchFailed

          kubectl apply -f k8s/samples/insufficient-privileges-policy.yaml
          wait_for_ready_reason insufficient-privileges-policy InsufficientPrivileges
          wait_for_last_error_contains insufficient-privileges-policy "permission denied to create role"
          assert_role_absent insufficient-privileges-user

          kubectl apply -f k8s/samples/plan-policy.yaml
          wait_for_ready_status_reason plan-policy True Planned
          wait_for_drift_status plan-policy True
          kubectl get pgr plan-policy -o jsonpath='{.status.last_reconcile_mode}' | grep -qx "plan"
          kubectl get pgr plan-policy -o jsonpath='{.status.planned_sql}' | grep -q 'CREATE ROLE \"plan-preview-user\"'
          assert_role_absent plan-preview-user
          wait_for_event_reason plan-policy DriftDetected

          upsert_secret rotating-postgres-credentials \
            DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:5432/postgres'
          kubectl apply -f k8s/samples/rotated-secret-policy.yaml
          wait_for_ready_true rotated-secret-policy

          upsert_secret rotating-postgres-credentials \
            DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:15432/postgres'
          wait_for_ready_reason rotated-secret-policy DatabaseConnectionFailed

          upsert_secret rotating-postgres-credentials \
            DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:5432/postgres'
          wait_for_ready_true rotated-secret-policy
          wait_for_event_reason rotated-secret-policy Recovered

          # ----------------------------------------------------------------
          # Structured params connection mode (#86): create, verify, rotate credentials
          # ----------------------------------------------------------------
          upsert_secret params-pg-credentials username=postgres password=devpassword
          kubectl apply -f k8s/samples/params-e2e-policy.yaml
          wait_for_ready_true params-e2e-policy

          assert_role_exists params-test-role
          echo "params-mode: basic reconciliation works"

          # Rotate credential Secret to bad password — should fail to connect
          upsert_secret params-pg-credentials username=postgres password=wrongpassword
          wait_for_ready_reason params-e2e-policy DatabaseConnectionFailed
          echo "params-mode: credential rotation detected (bad password)"

          # Rotate back to correct password — should recover
          upsert_secret params-pg-credentials username=postgres password=devpassword
          wait_for_ready_true params-e2e-policy
          wait_for_event_reason params-e2e-policy Recovered
          echo "params-mode: credential rotation recovery works"

          # ----------------------------------------------------------------
          # Password lifecycle (#46): create with Secret, verify, rotate
          # ----------------------------------------------------------------
          upsert_secret role-passwords password-user='e2e_initial_pw!'
          kubectl apply -f k8s/samples/password-policy.yaml
          wait_for_ready_true password-policy

          assert_role_exists password-user
          assert_password_set password-user
          initial_hash="$(get_password_hash password-user)"
          pg_query "SELECT rolvaliduntil FROM pg_authid WHERE rolname = 'password-user'" | grep -q "2099-12-31"
          assert_operator_logs_clean 'e2e_initial_pw!'

          upsert_secret role-passwords password-user='e2e_rotated_pw!'
          wait_for_password_hash_change password-user "$initial_hash"

          # ----------------------------------------------------------------
          # Generated password lifecycle: create, remain stable, recreate
          # ----------------------------------------------------------------
          kubectl apply -f k8s/samples/generated-password-policy.yaml
          wait_for_ready_true generated-password-policy

          assert_role_exists genuser
          assert_password_set genuser
          assert_secret_has_keys generated-password-policy-pgr-genuser password verifier
          generated_initial_hash="$(get_password_hash genuser)"
          wait_for_password_hash_stable genuser "$generated_initial_hash"

          kubectl delete secret generated-password-policy-pgr-genuser --wait=true
          # Wait for the operator to reconcile and regenerate the secret.
          for i in $(seq 1 30); do
            if kubectl get secret generated-password-policy-pgr-genuser -o name 2>/dev/null; then
              break
            fi
            echo "Waiting for secret regeneration... (attempt $i/30)"
            sleep 3
          done
          wait_for_ready_true generated-password-policy
          assert_secret_has_keys generated-password-policy-pgr-genuser password verifier
          wait_for_password_hash_change genuser "$generated_initial_hash"

          # Verify ownerReference GC: deleting the CR should garbage-collect the generated Secret
          kubectl delete pgr generated-password-policy --wait=true
          kubectl wait --for=delete secret/generated-password-policy-pgr-genuser --timeout=30s \
            && echo "Generated Secret was garbage-collected on CR deletion" \
            || { echo "::error::Generated Secret was NOT garbage-collected"; exit 1; }

          # ----------------------------------------------------------------
          # Password secret resolution errors (#43)
          # ----------------------------------------------------------------
          kubectl apply -f k8s/samples/missing-password-secret-policy.yaml
          wait_for_ready_reason missing-password-secret-policy SecretFetchFailed

          upsert_secret nonexistent-password-secret missing-pw-user='fixed_pw!'
          wait_for_ready_true missing-password-secret-policy
          assert_role_exists missing-pw-user
          wait_for_event_reason missing-password-secret-policy Recovered

          upsert_secret empty-password-secret empty-pw-user=''
          kubectl apply -f k8s/samples/empty-password-secret-policy.yaml
          wait_for_ready_reason empty-password-secret-policy InvalidSpec
          wait_for_last_error_contains empty-password-secret-policy "password is empty"

          upsert_secret empty-password-secret empty-pw-user='now_has_password!'
          wait_for_ready_true empty-password-secret-policy
          assert_role_exists empty-pw-user
          assert_password_set empty-pw-user
          wait_for_event_reason empty-password-secret-policy Recovered

      - name: Verify OTLP metrics reach the collector
        run: |
          for i in $(seq 1 30); do
            LOGS="$(kubectl -n pgroles-system logs deployment/otel-collector --tail=2000 2>/dev/null || true)"
            printf '%s\n' "$LOGS" | grep -q 'pgroles.policy.conflicts\|pgroles.apply.total\|pgroles.plan.total' && \
            printf '%s\n' "$LOGS" | grep -q 'pgroles.apply.statements\|pgroles.plan.changes' && \
            printf '%s\n' "$LOGS" | grep -q '"otelcol.component.kind": "exporter"' && {
              echo "Collector received operator metrics"
              exit 0
            }
            echo "Waiting for OTLP metrics export... (attempt $i/30)"
            sleep 5
          done
          echo "::error::Collector did not receive expected operator metrics"
          kubectl -n pgroles-system logs deployment/pgroles-operator --tail=100
          kubectl -n pgroles-system logs deployment/otel-collector --tail=200
          exit 1

      - name: Cleanup
        if: always()
        run: kind delete cluster --name pgroles-e2e-operator

  # ---------------------------------------------------------------------------
  # Job 5b: E2E — Load Tests
  # ---------------------------------------------------------------------------
  e2e-load:
    name: "E2E: Load Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          cluster-name: pgroles-e2e-load

      - name: Run load tests
        run: |
          source scripts/e2e-helpers.sh

          bash scripts/generate-load-policy.sh 20 /tmp/load-policy.yaml load-policy postgres-credentials loada
          bash scripts/generate-load-policy.sh 10 /tmp/load-policy-secondary.yaml load-policy-secondary loadtest-postgres-credentials loadb
          {
            echo "BEGIN;"
            for i in $(seq -w 1 20); do
              echo "CREATE SCHEMA IF NOT EXISTS loada_${i};"
              echo "CREATE TABLE IF NOT EXISTS loada_${i}.items (id integer generated always as identity primary key, name text not null);"
              echo "CREATE SEQUENCE IF NOT EXISTS loada_${i}.audit_seq;"
            done
            echo "COMMIT;"
          } | kubectl exec -i postgres-0 -- psql -v ON_ERROR_STOP=1 -U postgres -d postgres

          {
            echo "BEGIN;"
            for i in $(seq -w 1 10); do
              echo "CREATE SCHEMA IF NOT EXISTS loadb_${i};"
              echo "CREATE TABLE IF NOT EXISTS loadb_${i}.items (id integer generated always as identity primary key, name text not null);"
              echo "CREATE SEQUENCE IF NOT EXISTS loadb_${i}.audit_seq;"
            done
            echo "COMMIT;"
          } | kubectl exec -i postgres-0 -- psql -v ON_ERROR_STOP=1 -U postgres -d loadtest

          load_start="$(date +%s)"
          kubectl apply -f /tmp/load-policy.yaml
          kubectl apply -f /tmp/load-policy-secondary.yaml
          wait_for_ready_true load-policy 60 5
          wait_for_ready_true load-policy-secondary 60 5
          load_elapsed="$(( $(date +%s) - load_start ))"
          printf 'Generated load policies reconciled in %ss across %s databases, %s schemas, and %s generated roles\n' \
            "$load_elapsed" "2" "$((20 + 10))" "$(((20 + 10) * 2))" >> "$GITHUB_STEP_SUMMARY"

          test "$(pg_query "SELECT count(*) FROM pg_roles WHERE rolname ~ '^loada_[0-9]{2}-(editor|viewer)$'")" = "40"
          test "$(pg_query "SELECT count(*) FROM pg_roles WHERE rolname ~ '^loadb_[0-9]{2}-(editor|viewer)$'")" = "20"

          pg_query "SELECT has_schema_privilege('loada_01-editor', 'loada_01', 'USAGE')" | grep -qx "t"
          pg_query "SELECT has_table_privilege('loada_20-viewer', 'loada_20.items', 'SELECT')" | grep -qx "t"
          pg_query "SELECT has_sequence_privilege('loada_10-editor', 'loada_10.audit_seq', 'USAGE')" | grep -qx "t"
          pg_query "SELECT has_schema_privilege('loadb_01-editor', 'loadb_01', 'USAGE')" loadtest | grep -qx "t"
          pg_query "SELECT has_table_privilege('loadb_10-viewer', 'loadb_10.items', 'SELECT')" loadtest | grep -qx "t"
          pg_query "SELECT has_sequence_privilege('loadb_05-editor', 'loadb_05.audit_seq', 'USAGE')" loadtest | grep -qx "t"

      - name: Cleanup
        if: always()
        run: kind delete cluster --name pgroles-e2e-load

  # ---------------------------------------------------------------------------
  # Job 5c: E2E — Plan Lifecycle
  # ---------------------------------------------------------------------------
  e2e-plans:
    name: "E2E: Plan Lifecycle"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-e2e
        with:
          cluster-name: pgroles-e2e-plans

      - name: Run plan lifecycle scenarios
        run: |
          source scripts/e2e-helpers.sh

          # ================================================================
          # Group A: Manual approval flow
          # ================================================================

          echo "--- Test: Plan creation on drift detection ---"
          kubectl apply -f k8s/samples/plan-approval-policy.yaml
          wait_for_ready_status_reason plan-approval-policy True Planned
          wait_for_drift_status plan-approval-policy True

          # Verify plan was created
          plan_count=$(get_plan_count plan-approval-policy)
          if [ "$plan_count" -lt 1 ]; then
            echo "::error::Expected at least 1 plan for plan-approval-policy, got $plan_count"
            exit 1
          fi

          # Get the plan name
          plan_name=$(wait_for_current_plan_ref plan-approval-policy)

          # Verify plan fields
          phase=$(kubectl get pgplan "$plan_name" -o jsonpath='{.status.phase}')
          test "$phase" = "Pending" || { echo "::error::Expected Pending phase, got $phase"; exit 1; }

          total=$(kubectl get pgplan "$plan_name" -o jsonpath='{.status.changeSummary.total}')
          test "$total" -gt 0 || { echo "::error::Expected changes > 0, got $total"; exit 1; }

          hash=$(kubectl get pgplan "$plan_name" -o jsonpath='{.status.sqlHash}')
          test -n "$hash" || { echo "::error::Expected sqlHash to be set"; exit 1; }

          echo "--- Test: Printer columns display ---"
          kubectl get pgplan
          # Just verify command succeeds and shows our plan

          echo "--- Test: Manual approval -> Applied ---"
          approve_plan "$plan_name"
          wait_for_plan_phase "$plan_name" Applied

          assert_role_exists approval_test_user

          applied_at=$(kubectl get pgplan "$plan_name" -o jsonpath='{.status.appliedAt}')
          test -n "$applied_at" || { echo "::error::Expected appliedAt to be set"; exit 1; }

          # Verify events
          wait_for_event_reason plan-approval-policy PlanApproved
          wait_for_event_reason plan-approval-policy ApplySucceeded

          # Cleanup
          kubectl delete pgr plan-approval-policy --wait=true
          pg_query "REASSIGN OWNED BY approval_test_user TO postgres; DROP OWNED BY approval_test_user; DROP ROLE IF EXISTS approval_test_user;"

          # ================================================================
          # Group A continued: Rejection
          # ================================================================

          echo "--- Test: Plan rejection ---"
          # Create a new policy that will generate drift
          kubectl apply -f - <<EOF
          apiVersion: pgroles.io/v1alpha1
          kind: PostgresPolicy
          metadata:
            name: reject-test-policy
            namespace: default
          spec:
            connection:
              secretRef:
                name: postgres-credentials
            interval: "30s"
            mode: apply
            approval: manual
            roles:
              - name: reject_test_user
                login: true
            grants:
              - role: reject_test_user
                privileges: [CONNECT]
                object:
                  type: database
                  name: postgres
          EOF

          wait_for_ready_status_reason reject-test-policy True Planned
          plan_name=$(wait_for_current_plan_ref reject-test-policy)

          reject_plan "$plan_name"
          wait_for_plan_phase "$plan_name" Rejected

          # Verify role was NOT created
          if pg_query "SELECT 1 FROM pg_roles WHERE rolname='reject_test_user'" | grep -q 1; then
            echo "::error::reject_test_user should NOT exist after rejection"
            exit 1
          fi

          # Cleanup
          kubectl delete pgr reject-test-policy --wait=true

          # ================================================================
          # Group B: Auto-approval
          # ================================================================

          echo "--- Test: Auto-approval mode ---"
          kubectl apply -f k8s/samples/auto-approval-policy.yaml
          wait_for_ready_true auto-approval-policy

          # In auto mode, plan should be created AND applied automatically
          assert_role_exists auto_approved_user

          # Verify a plan exists and is Applied
          plan_count=$(get_plan_count auto-approval-policy)
          test "$plan_count" -ge 1 || { echo "::error::Expected at least 1 plan"; exit 1; }

          # The latest plan should be Applied
          latest_plan=$(kubectl get pgplan -l pgroles.io/policy=auto-approval-policy --sort-by=.metadata.creationTimestamp -o name | tail -1)
          phase=$(kubectl get "$latest_plan" -o jsonpath='{.status.phase}')
          test "$phase" = "Applied" || { echo "::error::Expected Applied phase for auto-approval, got $phase"; exit 1; }

          # Cleanup
          kubectl delete pgr auto-approval-policy --wait=true
          pg_query "REASSIGN OWNED BY auto_approved_user TO postgres; DROP OWNED BY auto_approved_user; DROP ROLE IF EXISTS auto_approved_user;"

          # ================================================================
          # Group C: Plan supersede on policy change
          # ================================================================

          echo "--- Test: Plan supersede on policy change ---"
          kubectl apply -f - <<EOF
          apiVersion: pgroles.io/v1alpha1
          kind: PostgresPolicy
          metadata:
            name: supersede-test
            namespace: default
          spec:
            connection:
              secretRef:
                name: postgres-credentials
            interval: "30s"
            mode: plan
            approval: manual
            roles:
              - name: supersede_user_v1
                login: true
          EOF

          wait_for_ready_status_reason supersede-test True Planned
          first_plan=$(wait_for_current_plan_ref supersede-test)
          echo "First plan: $first_plan"

          # Update policy - add another role
          kubectl apply -f - <<EOF
          apiVersion: pgroles.io/v1alpha1
          kind: PostgresPolicy
          metadata:
            name: supersede-test
            namespace: default
          spec:
            connection:
              secretRef:
                name: postgres-credentials
            interval: "30s"
            mode: plan
            approval: manual
            roles:
              - name: supersede_user_v1
                login: true
              - name: supersede_user_v2
                login: true
          EOF

          # Wait for currentPlanRef to change (not just exist)
          second_plan=""
          for i in $(seq 1 30); do
            second_plan="$(kubectl get pgr supersede-test -o jsonpath='{.status.current_plan_ref.name}' 2>/dev/null || true)"
            if [ -n "$second_plan" ] && [ "$second_plan" != "$first_plan" ]; then
              break
            fi
            echo "Waiting for supersede-test currentPlanRef to change... ($i/30)"
            sleep 3
          done
          echo "Second plan: $second_plan"

          if [ -z "$second_plan" ] || [ "$first_plan" = "$second_plan" ]; then
            echo "::error::Expected a new plan after policy change"
            exit 1
          fi

          # Verify first plan is Superseded
          first_phase=$(kubectl get pgplan "$first_plan" -o jsonpath='{.status.phase}')
          test "$first_phase" = "Superseded" || { echo "::error::Expected first plan to be Superseded, got $first_phase"; exit 1; }

          # Verify second plan is Pending
          second_phase=$(kubectl get pgplan "$second_plan" -o jsonpath='{.status.phase}')
          test "$second_phase" = "Pending" || { echo "::error::Expected second plan to be Pending, got $second_phase"; exit 1; }

          # Cleanup
          kubectl delete pgr supersede-test --wait=true

          # ================================================================
          # Group D: Finalizer cleanup on policy delete
          # ================================================================

          echo "--- Test: Finalizer cleanup on policy delete ---"
          kubectl apply -f - <<EOF
          apiVersion: pgroles.io/v1alpha1
          kind: PostgresPolicy
          metadata:
            name: cleanup-test
            namespace: default
          spec:
            connection:
              secretRef:
                name: postgres-credentials
            interval: "30s"
            mode: plan
            approval: manual
            roles:
              - name: cleanup_test_user
                login: true
          EOF

          wait_for_ready_status_reason cleanup-test True Planned
          plan_name=$(wait_for_current_plan_ref cleanup-test)

          # Delete the policy - plans should be GC'd via ownerReferences
          kubectl delete pgr cleanup-test --wait=true

          # Wait for GC to clean up the plan (async via ownerReferences)
          kubectl wait --for=delete "pgplan/${plan_name}" --timeout=30s || {
            echo "::error::Plan $plan_name should have been garbage collected"
            exit 1
          }
          echo "Plan garbage collected after policy deletion"

          # ================================================================
          # Group E: Error handling
          # ================================================================

          echo "--- Test: Invalid manifest does not create plan ---"
          kubectl apply -f k8s/samples/invalid-policy.yaml 2>/dev/null || true
          sleep 5
          plan_count=$(get_plan_count invalid-policy)
          test "$plan_count" -eq 0 || { echo "::error::Invalid policy should not create plans, got $plan_count"; exit 1; }
          echo "No plan created for invalid policy"
          kubectl delete pgr invalid-policy --wait=true 2>/dev/null || true

          # ================================================================
          # Group F: Multi-policy independent plans
          # ================================================================

          echo "--- Test: Multi-policy independent plans ---"
          # Create schemas first
          pg_query "CREATE SCHEMA IF NOT EXISTS schema_alpha;"
          pg_query "CREATE SCHEMA IF NOT EXISTS schema_beta;"

          kubectl apply -f k8s/samples/multi-schema-policy-a.yaml
          kubectl apply -f k8s/samples/multi-schema-policy-b.yaml

          wait_for_ready_status_reason multi-schema-a True Planned
          wait_for_ready_status_reason multi-schema-b True Planned

          plan_a=$(wait_for_current_plan_ref multi-schema-a)
          plan_b=$(wait_for_current_plan_ref multi-schema-b)

          test "$plan_a" != "$plan_b" || { echo "::error::Expected different plans for different policies"; exit 1; }
          echo "Independent plans created for multi-policy setup"

          # Cleanup
          kubectl delete pgr multi-schema-a multi-schema-b --wait=true
          pg_query "DROP SCHEMA IF EXISTS schema_alpha CASCADE; DROP SCHEMA IF EXISTS schema_beta CASCADE;"

          # ================================================================
          # Group G: Operator restart with pending plan
          # ================================================================

          echo "--- Test: Operator restart with pending plan ---"
          kubectl apply -f - <<EOF
          apiVersion: pgroles.io/v1alpha1
          kind: PostgresPolicy
          metadata:
            name: restart-test
            namespace: default
          spec:
            connection:
              secretRef:
                name: postgres-credentials
            interval: "30s"
            mode: apply
            approval: manual
            roles:
              - name: restart_test_user
                login: true
          EOF

          wait_for_ready_status_reason restart-test True Planned
          plan_name=$(wait_for_current_plan_ref restart-test)

          # Restart the operator
          kubectl -n pgroles-system rollout restart deployment/pgroles-operator
          kubectl -n pgroles-system rollout status deployment/pgroles-operator --timeout=60s

          # Plan should still exist and be Pending
          sleep 10
          phase=$(kubectl get pgplan "$plan_name" -o jsonpath='{.status.phase}')
          test "$phase" = "Pending" || { echo "::error::Expected plan to remain Pending after restart, got $phase"; exit 1; }

          # Approve it - should still work after restart
          approve_plan "$plan_name"
          wait_for_plan_phase "$plan_name" Applied
          assert_role_exists restart_test_user

          echo "Operator restart handled correctly"

          # Cleanup
          kubectl delete pgr restart-test --wait=true
          pg_query "REASSIGN OWNED BY restart_test_user TO postgres; DROP OWNED BY restart_test_user; DROP ROLE IF EXISTS restart_test_user;"

      - name: Cleanup
        if: always()
        run: kind delete cluster --name pgroles-e2e-plans
