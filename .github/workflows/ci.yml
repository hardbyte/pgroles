name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint — clippy, rustfmt, CRD drift check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny@0.19.0 --locked

      - name: Check dependencies
        run: cargo deny check

      - name: CRD drift check
        run: |
          cargo run --bin crdgen > /tmp/crd-generated.yaml
          diff k8s/crd.yaml /tmp/crd-generated.yaml || {
            echo "::error::CRD YAML is out of date. Run 'cargo run --bin crdgen > k8s/crd.yaml' and commit."
            exit 1
          }

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # Job 3: Integration tests — with a live PostgreSQL
  # ---------------------------------------------------------------------------
  integration-test:
    name: Integration Tests (PG${{ matrix.pg_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg_version: ["16", "17", "18"]
    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pgroles_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: "postgres://postgres:testpassword@localhost:5432/pgroles_test"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run integration tests (including ignored)
        run: cargo test --workspace -- --include-ignored

  # ---------------------------------------------------------------------------
  # Job 4: Docker smoke tests — verify doc examples work
  # ---------------------------------------------------------------------------
  docker-smoke:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: pgroles_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: "postgres://postgres:testpassword@localhost:5432/pgroles_test"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build CLI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: cli
          load: true
          tags: pgroles:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: "Smoke: --help via entrypoint"
        run: docker run --rm pgroles:smoke --help

      - name: "Smoke: volume mount + validate"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests/fixtures:/work" \
            pgroles:smoke \
            validate -f smoke-test.yaml

      - name: "Smoke: volume mount + diff against live DB"
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -v "${{ github.workspace }}/tests/fixtures:/work" \
            pgroles:smoke \
            diff -f smoke-test.yaml --no-exit-code

      - name: "Smoke: derived image builds and runs"
        run: |
          printf 'FROM pgroles:smoke\nCOPY tests/fixtures/smoke-test.yaml .\n' > /tmp/Dockerfile.derived
          docker build -f /tmp/Dockerfile.derived -t pgroles:derived .
          docker run --rm --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            pgroles:derived \
            diff -f smoke-test.yaml --no-exit-code

  # ---------------------------------------------------------------------------
  # Job 5: E2E — kind cluster + operator deployment
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --workspace

      - name: Install kind
        run: |
          [ -f /usr/local/bin/kind ] || {
            curl -Lo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
            echo "b89aada5a39d620da3fcd16435b7f28d858927dd53f92cbac77686b0588b600d  /usr/local/bin/kind" | sha256sum -c -
            chmod +x /usr/local/bin/kind
          }

      - name: Create kind cluster
        run: kind create cluster --name pgroles-e2e --wait 60s

      - name: Install CRD
        run: kubectl apply -f k8s/crd.yaml

      - name: Deploy dev PostgreSQL
        run: |
          kubectl apply -f k8s/dev/postgres.yaml
          kubectl rollout status statefulset/postgres --timeout=120s

      - name: Wait for PostgreSQL readiness
        run: |
          kubectl wait --for=condition=ready pod/postgres-0 --timeout=90s

      - name: Seed PostgreSQL objects for grant reconciliation
        run: |
          kubectl exec postgres-0 -- psql -U postgres -d postgres <<'SQL'
          CREATE TABLE IF NOT EXISTS public.inventory_items (
            id integer generated always as identity primary key,
            name text not null
          );
          CREATE SEQUENCE IF NOT EXISTS public.audit_seq;
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'limited_operator') THEN
              CREATE ROLE limited_operator LOGIN PASSWORD 'limitedpassword';
            ELSE
              ALTER ROLE limited_operator WITH LOGIN PASSWORD 'limitedpassword';
            END IF;
            ALTER ROLE limited_operator
              NOSUPERUSER
              NOCREATEDB
              NOCREATEROLE
              INHERIT
              NOREPLICATION
              NOBYPASSRLS;
          END
          $$;
          SQL

      - name: Create limited-privilege database secret
        run: |
          kubectl create secret generic limited-postgres-credentials \
            --from-literal=DATABASE_URL='postgres://limited_operator:limitedpassword@postgres.default.svc.cluster.local:5432/postgres' \
            --dry-run=client -o yaml | kubectl apply -f -

      - uses: docker/setup-buildx-action@v4

      - name: Build operator image and load into kind
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: operator
          load: true
          tags: pgroles-operator:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image into kind
        run: kind load docker-image pgroles-operator:e2e --name pgroles-e2e

      - name: Deploy operator
        run: |
          kubectl apply -f k8s/deploy/namespace.yaml
          kubectl apply -f k8s/deploy/rbac.yaml
          kubectl apply -f k8s/dev/otel-collector.yaml
          kubectl -n pgroles-system rollout status deployment/otel-collector --timeout=120s

          # Patch deployment to use the locally-built image.
          sed 's|ghcr.io/hardbyte/pgroles-operator:latest|pgroles-operator:e2e|' \
            k8s/deploy/deployment.yaml | \
            sed 's|imagePullPolicy:.*|imagePullPolicy: Never|' | \
            kubectl apply -f -

          kubectl -n pgroles-system set env deployment/pgroles-operator \
            OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector.pgroles-system.svc.cluster.local:4317 \
            OTEL_METRICS_EXPORTER=otlp \
            OTEL_METRIC_EXPORT_INTERVAL=2000

          kubectl -n pgroles-system rollout status deployment/pgroles-operator --timeout=60s

      - name: Apply sample policy
        run: kubectl apply -f k8s/samples/basic-policy.yaml

      - name: Wait for reconciliation
        run: |
          for i in $(seq 1 30); do
            STATUS=$(kubectl get pgr basic-policy -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            if [ "$STATUS" = "True" ]; then
              echo "Policy reconciled successfully"
              exit 0
            fi
            echo "Waiting for reconciliation... (attempt $i/30)"
            sleep 5
          done
          echo "::error::Policy did not reach Ready=True within timeout"
          kubectl get pgr basic-policy -o yaml
          kubectl -n pgroles-system logs deployment/pgroles-operator --tail=50
          exit 1

      - name: Verify roles exist in PostgreSQL
        run: |
          kubectl exec postgres-0 -- psql -U postgres -c "SELECT rolname FROM pg_roles WHERE rolname LIKE 'public-%' ORDER BY rolname;" | tee /dev/stderr | grep -q "public-editor"

      - name: Run additional operator scenarios
        run: |
          wait_for_ready_true() {
            policy="$1"
            for i in $(seq 1 30); do
              status="$(kubectl get pgr "$policy" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
              if [ "$status" = "True" ]; then
                echo "$policy reached Ready=True"
                return 0
              fi
              echo "Waiting for $policy Ready=True... (attempt $i/30)"
              sleep 3
            done
            echo "::error::$policy did not reach Ready=True"
            kubectl get pgr "$policy" -o yaml || true
            kubectl -n pgroles-system logs deployment/pgroles-operator --tail=200 || true
            return 1
          }

          wait_for_ready_reason() {
            policy="$1"
            expected_reason="$2"
            for i in $(seq 1 30); do
              status="$(kubectl get pgr "$policy" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)"
              reason="$(kubectl get pgr "$policy" -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || true)"
              if [ "$status" = "False" ] && [ "$reason" = "$expected_reason" ]; then
                echo "$policy reached Ready=False with reason=$expected_reason"
                return 0
              fi
              echo "Waiting for $policy Ready=False/$expected_reason... (attempt $i/30)"
              sleep 3
            done
            echo "::error::$policy did not reach Ready=False with reason=$expected_reason"
            kubectl get pgr "$policy" -o yaml || true
            kubectl -n pgroles-system logs deployment/pgroles-operator --tail=200 || true
            return 1
          }

          wait_for_last_error_contains() {
            policy="$1"
            expected_substring="$2"
            for i in $(seq 1 30); do
              last_error="$(kubectl get pgr "$policy" -o jsonpath='{.status.lastError}' 2>/dev/null || true)"
              if printf '%s' "$last_error" | grep -Fq "$expected_substring"; then
                echo "$policy reported expected error substring: $expected_substring"
                return 0
              fi
              echo "Waiting for $policy lastError to contain '$expected_substring'... (attempt $i/30)"
              sleep 3
            done
            echo "::error::$policy lastError did not contain $expected_substring"
            kubectl get pgr "$policy" -o yaml || true
            kubectl -n pgroles-system logs deployment/pgroles-operator --tail=200 || true
            return 1
          }

          kubectl delete pgr basic-policy --wait=true

          kubectl apply -f k8s/samples/disjoint-policy.yaml
          wait_for_ready_true disjoint-policy
          kubectl exec postgres-0 -- psql -U postgres -tAc "SELECT rolname FROM pg_roles WHERE rolname = 'analytics'" | grep -qx "analytics"

          kubectl apply -f k8s/samples/second-disjoint-policy.yaml
          wait_for_ready_true second-disjoint-policy
          kubectl exec postgres-0 -- psql -U postgres -tAc "SELECT rolname FROM pg_roles WHERE rolname = 'reporting'" | grep -qx "reporting"

          kubectl apply -f k8s/samples/conflicting-policy.yaml
          wait_for_ready_reason conflicting-policy ConflictingPolicy

          kubectl apply -f k8s/samples/invalid-policy.yaml
          wait_for_ready_reason invalid-policy InvalidSpec

          kubectl apply -f k8s/samples/missing-secret-policy.yaml
          wait_for_ready_reason missing-secret-policy SecretFetchFailed

          kubectl apply -f k8s/samples/insufficient-privileges-policy.yaml
          wait_for_ready_reason insufficient-privileges-policy InsufficientPrivileges
          wait_for_last_error_contains insufficient-privileges-policy "permission denied"
          ! kubectl exec postgres-0 -- psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname = 'insufficient-privileges-user'" | grep -qx "1"

          kubectl create secret generic rotating-postgres-credentials \
            --from-literal=DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:5432/postgres' \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/samples/rotated-secret-policy.yaml
          wait_for_ready_true rotated-secret-policy

          kubectl create secret generic rotating-postgres-credentials \
            --from-literal=DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:15432/postgres' \
            --dry-run=client -o yaml | kubectl apply -f -
          wait_for_ready_reason rotated-secret-policy DatabaseConnectionFailed

          kubectl create secret generic rotating-postgres-credentials \
            --from-literal=DATABASE_URL='postgres://postgres:devpassword@postgres.default.svc.cluster.local:5432/postgres' \
            --dry-run=client -o yaml | kubectl apply -f -
          wait_for_ready_true rotated-secret-policy

      - name: Verify OTLP metrics reach the collector
        run: |
          for i in $(seq 1 30); do
            LOGS="$(kubectl -n pgroles-system logs deployment/otel-collector --tail=200 2>/dev/null || true)"
            printf '%s\n' "$LOGS" | grep -q 'pgroles.reconcile.total' && \
            printf '%s\n' "$LOGS" | grep -q 'pgroles.policy.conflicts\|pgroles.apply.total\|pgroles.apply.statements' && \
            printf '%s\n' "$LOGS" | grep -q 'pgroles-operator' && {
              echo "Collector received operator metrics"
              exit 0
            }
            echo "Waiting for OTLP metrics export... (attempt $i/30)"
            sleep 5
          done
          echo "::error::Collector did not receive expected operator metrics"
          kubectl -n pgroles-system logs deployment/pgroles-operator --tail=100
          kubectl -n pgroles-system logs deployment/otel-collector --tail=200
          exit 1

      - name: Cleanup
        if: always()
        run: kind delete cluster --name pgroles-e2e
