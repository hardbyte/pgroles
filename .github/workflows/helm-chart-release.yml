name: Release Helm Chart (OCI)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Package chart
        run: helm package charts/pgroles-operator

      - name: Push chart to GHCR
        run: helm push pgroles-operator-*.tgz oci://ghcr.io/hardbyte/charts
