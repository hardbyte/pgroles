name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  # ---------------------------------------------------------------------------
  # Build & push Docker images (multi-arch)
  # ---------------------------------------------------------------------------
  docker-operator:
    name: Docker — Operator
    needs: [build-binaries]
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: pgroles-operator
      IMAGE_REGISTRY: ghcr.io
      IMAGE_REPOSITORY: hardbyte
    steps:
      - uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: docker-binary-*
          path: dist
          merge-multiple: true

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          target: operator-runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

  docker-cli:
    name: Docker — CLI
    needs: [build-binaries]
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: pgroles
      IMAGE_REGISTRY: ghcr.io
      IMAGE_REPOSITORY: hardbyte
    steps:
      - uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux binary artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: docker-binary-*
          path: dist
          merge-multiple: true

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.runtime
          target: cli-runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign image with cosign
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # Cross-compile CLI binaries for GitHub Releases
  # ---------------------------------------------------------------------------
  build-binaries:
    name: Build — ${{ matrix.binary }} — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            package: pgroles-cli
            binary: pgroles
            release_asset: true
            docker_asset: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            package: pgroles-cli
            binary: pgroles
            release_asset: true
            docker_asset: true
          - target: x86_64-apple-darwin
            os: macos-latest
            package: pgroles-cli
            binary: pgroles
            release_asset: true
            docker_asset: false
          - target: aarch64-apple-darwin
            os: macos-latest
            package: pgroles-cli
            binary: pgroles
            release_asset: true
            docker_asset: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            package: pgroles-operator
            binary: pgroles-operator
            release_asset: false
            docker_asset: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            package: pgroles-operator
            binary: pgroles-operator
            release_asset: false
            docker_asset: true
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross --tag v0.2.5 --locked

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --package ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --package ${{ matrix.package }} --target ${{ matrix.target }}

      - name: Package binary
        if: matrix.release_asset
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="pgroles-${TAG}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${ARCHIVE}/"
          cp README.md LICENSE* "${ARCHIVE}/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          echo "ARCHIVE=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload release artifact
        if: matrix.release_asset
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

      - name: Prepare Docker binary artifact
        if: matrix.docker_asset
        shell: bash
        run: |
          mkdir -p docker-dist
          install -Dm755 \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "docker-dist/${{ matrix.binary }}-${{ matrix.target }}"

      - name: Upload Docker binary artifact
        if: matrix.docker_asset
        uses: actions/upload-artifact@v6
        with:
          name: docker-binary-${{ matrix.binary }}-${{ matrix.target }}
          path: docker-dist/${{ matrix.binary }}-${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # Create GitHub Release with binaries
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: "*.tar.gz"

  # ---------------------------------------------------------------------------
  # Publish to crates.io
  # ---------------------------------------------------------------------------
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      # Publish in dependency order. --no-verify because we use SQLX_OFFLINE
      # and the crates.io build environment won't have a database.
      - name: Publish pgroles-core
        run: cargo publish --package pgroles-core --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish pgroles-inspect
        run: cargo publish --package pgroles-inspect --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish pgroles-operator
        run: cargo publish --package pgroles-operator --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish pgroles-cli
        run: cargo publish --package pgroles-cli --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
