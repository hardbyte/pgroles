                              "INSERT",
                              "UPDATE",
                              "DELETE",
                              "TRUNCATE",
                              "REFERENCES",
                              "TRIGGER",
                              "EXECUTE",
                              "USAGE",
                              "CREATE",
                              "CONNECT",
                              "TEMPORARY"
