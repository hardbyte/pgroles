                                  "nullable": true,
                                  "type": "integer"
                                },
                                "secretKey": {
                                  "description": "Key within the generated Secret. Defaults to `password`.",
                                  "nullable": true,
                                  "type": "string"
                                },
                                "secretName": {
                                  "description": "Override the generated Secret name. Defaults to `{policy}-pgr-{role}`.",
                                  "nullable": true,
                                  "type": "string"
                                }
                              },
                              "type": "object"
                            },
                            "secretKey": {
                              "description": "Key within the referenced Secret. Defaults to the role name.\nOnly used with `secretRef`.",
                              "nullable": true,
                              "type": "string"
                            },
                            "secretRef": {
                              "description": "Reference to an existing Kubernetes Secret containing the password.\nMutually exclusive with `generate`.",
