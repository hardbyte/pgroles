                          "description": "The role that owns newly created objects. If omitted, uses manifest's default_owner.",
                          "nullable": true,
                          "type": "string"
                        },
                        "schema": {
                          "type": "string"
                        }
                      },
                      "required": [
                        "grant",
                        "schema"
                      ],
                      "type": "object"
                    },
                    "type": "array"
                  },
                  "grants": {
                    "default": [],
                    "description": "One-off grants.",
                    "items": {
                      "description": "A concrete grant on a specific object or wildcard.",
                      "properties": {
                        "on": {
                          "description": "Target object for a grant.",
                          "properties": {
                            "name": {
                              "description": "Object name, or \"*\" for all objects. Omit for schema-level grants.",
