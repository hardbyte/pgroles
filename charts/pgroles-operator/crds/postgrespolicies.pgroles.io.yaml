        "name": "v1alpha1",
        "schema": {
          "openAPIV3Schema": {
            "description": "Auto-generated derived type for PostgresPolicySpec via `CustomResource`",
            "properties": {
              "spec": {
                "description": "Spec for a `PostgresPolicy` custom resource.\n\nDefines the desired state of PostgreSQL roles, grants, default privileges,\nand memberships for a single database connection.",
                "properties": {
                  "connection": {
                    "description": "Database connection configuration.",
                    "properties": {
                      "secretKey": {
                        "default": "DATABASE_URL",
                        "description": "Override the key in the Secret to read. Defaults to `DATABASE_URL`.",
                        "type": "string"
                      },
                      "secretRef": {
                        "description": "Reference to a Kubernetes Secret containing the connection string.\nThe secret must have a key named `DATABASE_URL`.",
                        "properties": {
                          "name": {
                            "description": "Name of the Secret.",
                            "type": "string"
                          }
                        },
                        "required": [
                          "name"
                        ],
                        "type": "object"
                      }
                    },
                    "required": [
                      "secretRef"
                    ],
                    "type": "object"
                  },
                  "default_owner": {
                    "description": "Default owner for ALTER DEFAULT PRIVILEGES (e.g. \"app_owner\").",
                    "nullable": true,
                    "type": "string"
                  },
                  "default_privileges": {
                    "default": [],
                    "description": "One-off default privileges.",
                    "items": {
                      "description": "Default privilege configuration.",
                      "properties": {
                        "grant": {
                          "items": {
                            "description": "A single default privilege grant entry.",
                            "properties": {
                              "on_type": {
                                "description": "PostgreSQL object types that can have privileges granted on them.",
                                "enum": [
                                  "table",
                                  "view",
                                  "materialized_view",
                                  "sequence",
                                  "function",
                                  "schema",
                                  "database",
                                  "type"
                                ],
                                "type": "string"
                              },
                              "privileges": {
                                "items": {
                                  "description": "PostgreSQL privilege types.",
                                  "enum": [
                                    "SELECT",
                                    "INSERT",
                                    "UPDATE",
                                    "DELETE",
                                    "TRUNCATE",
                                    "REFERENCES",
                                    "TRIGGER",
                                    "EXECUTE",
                                    "USAGE",
                                    "CREATE",
                                    "CONNECT",
                                    "TEMPORARY"
                                  ],
                                  "type": "string"
                                },
                                "type": "array"
                              },
                              "role": {
                                "description": "The role receiving the default privilege. Only used in top-level default_privileges\n(in profiles, the role is determined by expansion).",
                                "nullable": true,
                                "type": "string"
                              }
                            },
                            "required": [
                              "on_type",
                              "privileges"
                            ],
                            "type": "object"
                          },
                          "type": "array"
                        },
