                        "default_privileges": {
                          "default": [],
                          "items": {
                            "description": "Default privilege grant within a profile.",
                            "properties": {
                              "on_type": {
                                "description": "PostgreSQL object types that can have privileges granted on them.",
                                "enum": [
                                  "table",
                                  "view",
                                  "materialized_view",
                                  "sequence",
                                  "function",
                                  "schema",
                                  "database",
                                  "type"
                                ],
                                "type": "string"
                              },
                              "privileges": {
                                "items": {
                                  "description": "PostgreSQL privilege types.",
                                  "enum": [
                                    "SELECT",
                                    "INSERT",
                                    "UPDATE",
                                    "DELETE",
                                    "TRUNCATE",
                                    "REFERENCES",
                                    "TRIGGER",
                                    "EXECUTE",
                                    "USAGE",
