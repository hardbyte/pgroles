apiVersion: v2
name: pgroles-operator
description: >-
  Declarative PostgreSQL role and privilege management.
  Define roles, memberships, grants, and default privileges in YAML
  and let the operator converge your database to the desired state.
type: application
version: 0.7.0-beta.2
appVersion: "0.7.0-beta.2"
icon: https://raw.githubusercontent.com/hardbyte/pgroles/main/docs/public/logo.svg
sources:
  - https://github.com/hardbyte/pgroles
maintainers:
  - name: Brian Thorne
    email: brian@hardbyte.nz
    url: https://hardbyte.nz
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: 'Large plan SQL previews are stored as gzip-compressed ConfigMap binaryData before the plan is made visible, avoiding ConfigMap size failures and retry loops.'
    - kind: fixed
      description: 'Stale status-less plans and orphaned plan SQL ConfigMaps are cleaned up defensively before and after reconcile.'
  artifacthub.io/category: database
  artifacthub.io/operator: "true"
  artifacthub.io/prerelease: "true"
  artifacthub.io/operatorCapabilities: Basic Install
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/hardbyte/pgroles
  artifacthub.io/crds: |
    - kind: PostgresPolicy
      version: v1alpha1
      name: postgrespolicies.pgroles.io
      displayName: Postgres Policy
      description: Declarative PostgreSQL role graph — roles, memberships, grants, and default privileges.
  artifacthub.io/crdsExamples: |
    - apiVersion: pgroles.io/v1alpha1
      kind: PostgresPolicy
      metadata:
        name: example-policy
      spec:
        connection:
          secretRef:
            name: postgres-credentials
        profiles:
          editor:
            grants:
              - object: { type: table, name: "*" }
                privileges: [SELECT, INSERT, UPDATE, DELETE]
              - object: { type: schema }
                privileges: [USAGE]
          viewer:
            grants:
              - object: { type: table, name: "*" }
                privileges: [SELECT]
              - object: { type: schema }
                privileges: [USAGE]
        schemas:
          - name: public
            profiles: [editor, viewer]
