apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pgroles-operator.fullname" . }}
  labels:
    {{- include "pgroles-operator.labels" . | nindent 4 }}
rules:
  # Watch and manage PostgresPolicy CRDs
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicies"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicies/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicies/finalizers"]
    verbs: ["update"]
  # Watch and manage PostgresPolicyPlan CRDs
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicyplans"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["pgroles.io"]
    resources: ["postgrespolicyplans/status"]
    verbs: ["get", "patch", "update"]
  # Read Secrets for database connection strings and password references;
  # create/update Secrets for operator-generated passwords.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Create ConfigMaps for plan SQL storage
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Emit events for kubectl describe / operational debugging
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
